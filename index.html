<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Teste GitHub</title>
    <link rel="icon" href="https://flaticon.com">
    <style>
        /* Estilo padrão (Modo Claro) */
        body { 
            background-color: #f0f0f2; 
            font-family: sans-serif; 
            transition: background 0.3s, color 0.3s; 
        }
        
        h1 { color: #2c3e50; }
        h2 { color: blue; }
        
        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            transition: background 0.3s;
        }

        /* Regras para quando o Modo Escuro estiver ativo */
        body.dark-mode {
            background-color: #1a1a1a !important;
            color: #ffffff !important;
        }
        body.dark-mode .container {
            background-color: #2d2d2d;
            color: #ffffff;
        }
        body.dark-mode h1, body.dark-mode h2 { color: #bb86fc; }
        body.dark-mode blockquote { color: #bbb; }

        /* Estilos adicionais */
        nav { background: #333; padding: 10px; color: white; text-align: center; } 
        nav a { color: white; text-decoration: none; }
        blockquote { font-style: italic; color: #555; border-left: 4px solid #ccc; padding-left: 10px; margin: 20px 0; }
        #perfil { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        #foto { width: 100px; height: 100px; border-radius: 50%; background: #ddd; object-fit: cover; }
        input { padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc; width: 80%; }
        .contador-container { margin: 20px; padding: 15px; background: #e3f2fd; border-radius: 10px; }
        #valor-contador { font-weight: bold; color: #1976d2; font-size: 1.5em; }
        button { cursor: pointer; margin: 5px; padding: 8px 12px; border: none; border-radius: 5px; }
        #btn-incrementar { background: #4caf50; color: white; }
        #btn-zerar { background: #f44336; color: white; }
        .btn-acao { background: #607d8b; color: white; }
        .theme-switch { margin-bottom: 15px; }
        #toggle-theme { background: #333; color: white; border: 1px solid #555; }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a> | <a href="#">Serviços</a> | <a href="contato.html">Contato</a>
    </nav>

    <div class="container">
        <div id="perfil">
            <img id="foto" src="https://placeholder.com" alt="Foto">
            <h3 id="nome-usuario">Nome do Usuário</h3>
            <p id="bio">Sua bio aparece aqui...</p>
        </div>

        <div class="theme-switch">
            <button id="toggle-theme">Alternar Modo Escuro</button>
        </div>

        <h1>Olá, GitHub!</h1>
        
        <section>
            <blockquote>"O Git mudou minha vida!" - Dev Iniciante</blockquote>
        </section>

        <div class="contador-container">
            <h2>Contador: <span id="valor-contador">0</span></h2>
            <button id="btn-incrementar">Aumentar +1</button>
            <button id="btn-zerar">Zerar</button>
        </div>

        <input type="text" id="nome" placeholder="Seu nome"><br>
        
        <button class="btn-acao" onclick="dizerOi()">Dizer Oi</button>
        <button class="btn-acao" onclick="mudarCor()">Mudar Cor</button>
        
        <p><a href="sobre.html">Ir para Sobre</a></p>
    </div>

    <script>
        // Perfil e Saudação
        function carregarPerfil() {
            document.getElementById('nome-usuario').innerText = "Hique Dev";
            document.getElementById('bio').innerText = "Aprendendo Git e GitHub na prática! 🚀";
        }
        carregarPerfil();

        const hora = new Date().getHours(); 
        if(hora < 12) alert('Bom dia!');

        function dizerOi() { 
            const n = document.getElementById('nome').value; 
            if(n) {
                alert('Oi ' + n); 
                document.getElementById('nome-usuario').innerText = n;
            }
        }

        function mudarCor() {
            document.body.style.backgroundColor = 
                '#' + Math.floor(Math.random()*16777215).toString(16);
        }

        // Contador
        let count = 0;
        const display = document.getElementById('valor-contador');
        document.getElementById('btn-incrementar').onclick = function() {
            count++;
            display.innerText = count;
        };
        document.getElementById('btn-zerar').onclick = function() {
            count = 0;
            display.innerText = count;
        };

        // Lógica do Tema Atualizada
        const btnTheme = document.getElementById('toggle-theme');
        btnTheme.onclick = function() {
            // O 'toggle' adiciona a classe se ela não existe, e remove se ela já existe
            document.body.classList.toggle('dark-mode');
        };
    </script>
</body>
</html>
