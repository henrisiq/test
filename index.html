<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Teste GitHub</title>
    <link rel="icon" href="https://flaticon.com">
    <style>
        body { background-color: #f0f0f2; font-family: sans-serif; }
        h1 { color: #2c3e50; }
        h2 { color: blue; }
        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        nav { background: #333; padding: 10px; color: white; text-align: center; } 
        nav a { color: white; text-decoration: none; }
        blockquote { font-style: italic; color: #555; border-left: 4px solid #ccc; padding-left: 10px; margin: 20px 0; }
        input { padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc; width: 80%; }
        button { padding: 8px 15px; cursor: pointer; margin: 5px; border-radius: 4px; border: 1px solid #ddd; }
        #perfil { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        #foto { width: 100px; height: 100px; border-radius: 50%; background: #ddd; object-fit: cover; }
        
        /* Estilo para o novo contador */
        .contador-container { margin: 20px 0; padding: 10px; border: 1px dashed #ccc; border-radius: 8px; }
        #valor-contador { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a> | 
        <a href="#">Serviços</a> | 
        <a href="contato.html">Contato</a>
    </nav>

    <div class="container">
        <div id="perfil">
            <img id="foto" src="https://placeholder.com" alt="Foto">
            <h3 id="nome-usuario">Nome do Usuário</h3>
            <p id="bio">Sua bio aparece aqui...</p>
        </div>

        <h1>Olá, GitHub!</h1>
        
        <section>
            <blockquote>"O Git mudou minha vida!" - Dev Iniciante</blockquote>
        </section>

        <!-- Seção do Contador adicionada aqui -->
        <div class="contador-container">
            <h2>Contador: <span id="valor-contador">0</span></h2>
            <button id="btn-incrementar">Aumentar +1</button>
            <button id="btn-zerar">Zerar</button>
        </div>

        <input type="text" id="nome" placeholder="Seu nome"><br>
        
        <button onclick="dizerOi()">Dizer Oi</button>
        <button onclick="mudarCor()">Mudar Cor</button>
        
        <p><a href="sobre.html">Ir para Sobre</a></p>
    </div>

    <script>
    const hora = new Date().getHours(); 
    if(hora < 12) alert('Bom dia!');

    function carregarPerfil() {
        document.getElementById('nome-usuario').innerText = "Hique Dev";
        document.getElementById('bio').innerText = "Aprendendo Git e GitHub na prática! 🚀";
    }
    carregarPerfil();

    function dizerOi() { 
        const n = document.getElementById('nome').value; 
        if(n) {
            alert('Oi ' + n); 
            document.getElementById('nome-usuario').innerText = n;
        }
    }

    function mudarCor() {
        document.body.style.backgroundColor = 
            '#' + Math.floor(Math.random()*16777215).toString(16);
    }

    // A lógica para os botões do contador deve ser adicionada aqui
    </script>
</body>
</html>
