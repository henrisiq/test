<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Teste GitHub</title>
    <link rel="icon" href="https://flaticon.com">
    <style>
        /* Estilo padrão (Modo Claro) */
        body { background-color: #f0f0f2; font-family: sans-serif; transition: background 0.3s, color 0.3s; }
        h1 { color: #2c3e50; }
        h2 { color: blue; }
        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            transition: background 0.3s;
        }

        /* Estilo da Barra de Progresso */
        #progress-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 5px;
            margin: 10px 0;
            height: 10px;
            overflow: hidden;
        }
        #progress-bar {
            width: 30%; /* Exemplo de preenchimento */
            height: 100%;
            background-color: #4caf50;
            transition: width 0.3s;
        }

        /* Modo Escuro */
        body.dark-mode { background-color: #1a1a1a !important; color: #ffffff !important; }
        body.dark-mode .container { background-color: #2d2d2d; color: #ffffff; }
        body.dark-mode h1, body.dark-mode h2 { color: #bb86fc; }
        body.dark-mode .box-frase { background: #3d2b1f; color: #eee; border-left-color: #e65100; }
        body.dark-mode #progress-container { background-color: #444; }

        /* Navegação e Perfil */
        nav { background: #333; padding: 10px; color: white; text-align: center; } 
        nav a { color: white; text-decoration: none; }
        #perfil { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        #foto { width: 100px; height: 100px; border-radius: 50%; background: #ddd; object-fit: cover; }
        
        /* Contador */
        .contador-container { margin: 20px; padding: 15px; background: #e3f2fd; border-radius: 10px; }
        #valor-contador { font-weight: bold; color: #1976d2; font-size: 1.5em; }

        /* Estilos da Box de Frase */
        .box-frase {
            border-left: 5px solid #ff9800;
            padding: 20px;
            background: #fff3e0;
            font-style: italic;
            margin: 20px 0;
        }
        #btn-nova-frase {
            background: #ff9800;
            color: white;
            font-style: normal;
            margin-top: 10px;
        }

        /* Botões Gerais */
        button { cursor: pointer; margin: 5px; padding: 8px 12px; border: none; border-radius: 5px; }
        #btn-incrementar { background: #4caf50; color: white; }
        #btn-zerar { background: #f44336; color: white; }
        .btn-acao { background: #607d8b; color: white; }
        #toggle-theme { background: #333; color: white; border: 1px solid #555; }
        input { padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc; width: 80%; }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a> | <a href="#">Serviços</a> | <a href="contato.html">Contato</a>
    </nav>

    <div class="container">
        <div id="perfil">
            <img id="foto" src="https://placeholder.com" alt="Foto">
            <h3 id="nome-usuario">Nome do Usuário</h3>
            <p id="bio">Sua bio aparece aqui...</p>
        </div>

        <button id="toggle-theme">Alternar Modo Escuro</button>

        <!-- Barra de Progresso Adicionada -->
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div class="contador-container">
            <h2>Contador: <span id="valor-contador">0</span></h2>
            <button id="btn-incrementar">Aumentar +1</button>
            <button id="btn-zerar">Zerar</button>
        </div>

        <!-- Seção de Frases -->
        <div class="box-frase">
            <p id="texto-frase">Clique no botão para se inspirar!</p>
            <button id="btn-nova-frase">Nova Frase</button>
        </div>

        <input type="text" id="nome" placeholder="Seu nome"><br>
        <button class="btn-acao" onclick="dizerOi()">Dizer Oi</button>
        <button class="btn-acao" onclick="mudarCor()">Mudar Cor</button>
    </div>

    <script>
        // Perfil
        function carregarPerfil() {
            document.getElementById('nome-usuario').innerText = "Hique Dev";
            document.getElementById('bio').innerText = "Aprendendo Git e GitHub na prática! 🚀";
        }
        carregarPerfil();

        // Saudação e Ações
        function dizerOi() { 
            const n = document.getElementById('nome').value; 
            if(n) { alert('Oi ' + n); document.getElementById('nome-usuario').innerText = n; }
        }

        function mudarCor() {
            document.body.style.backgroundColor = '#' + Math.floor(Math.random()*16777215).toString(16);
        }

        // Contador e Barra de Progresso
        let count = 0;
        const display = document.getElementById('valor-contador');
        const progressBar = document.getElementById('progress-bar');

        function atualizarProgresso() {
            // Exemplo: a cada clique aumenta 10% da barra até 100%
            let percent = Math.min(count * 10, 100);
            progressBar.style.width = percent + '%';
        }

        document.getElementById('btn-incrementar').onclick = () => { 
            count++; 
            display.innerText = count; 
            atualizarProgresso();
        };

        document.getElementById('btn-zerar').onclick = () => { 
            count = 0; 
            display.innerText = count; 
            atualizarProgresso();
        };

        // Tema
        document.getElementById('toggle-theme').onclick = () => document.body.classList.toggle('dark-mode');

        // Lógica das Frases
        const frases = [
            "O melhor commit é o de hoje!",
            "Seu código está ficando incrível.",
            "Persistência é o segredo do dev.",
            "Um bug hoje, um aprendizado amanhã."
        ];

        document.getElementById('btn-nova-frase').onclick = function() {
            const random = Math.floor(Math.random() * frases.length);
            document.getElementById('texto-frase').innerText = frases[random];
        };
    </script>
</body>
</html>
